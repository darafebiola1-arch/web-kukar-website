<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peta Kutai Kartanegara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #DCE5C1;
  text-align: center;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #6F7F5F;
  padding: 12px;
  position: relative;
}

.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.menu a {
  color: #F5F5DC;
  margin: 5px;
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 8px;
}

.menu a.active {
  background: #DCE5C1;
  color: #2F3E2C;
}

.hamburger {
  position: absolute;
  left: 15px;
  font-size: 26px;
  color: #F5F5DC;
  cursor: pointer;
  display: none;
}

/* SECTION */
.section {
  padding: 30px;
}

.map-container {
  width: 90%;
  height: 450px;
  margin: auto;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.btn {
  margin-top: 20px;
  padding: 12px 20px;
  background: #6F7F5F;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* FIX LAPTOP */
@media (min-width: 769px) {
  .menu {
    display: flex !important;
    position: static;
  }
}

/* RESPONSIVE HP */
@media (max-width: 768px) {

  .hamburger {
    display: block;
  }

  .menu {
    display: none;
    flex-direction: column;
    width: 100%;
    background: #6F7F5F;
    position: absolute;
    top: 60px;
    left: 0;
  }

  .menu a {
    text-align: center;
    padding: 12px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }

  .menu.show {
    display: flex;
  }

  .map-container {
    height: 300px;
  }
}
</style>

</head>

<body>

<div class="navbar">
  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <div class="menu" id="menu">
    <a href="index.html">Home</a>
    <a href="wisata.html">Wisata</a>
    <a href="aktivitas.html">Aktivitas</a>
    <a href="budaya.html">Budaya</a>
    <a href="kuliner.html">Kuliner</a>
    <a href="hotel.html">Akomodasi</a>
    <a href="transportasi.html">Transportasi</a>
    <a href="peta.html" class="active">Peta</a>
    <a href="tiket.html">Tiket</a>
    <a href="tentang.html">Tentang</a>
    <a href="galeri.html">Galeri</a>
  </div>
</div>

<div class="section">

  <div class="map-container">
    <iframe 
      src="https://maps.google.com/maps?q=Kutai%20Kartanegara&t=&z=10&ie=UTF8&iwloc=&output=embed">
    </iframe>
  </div>

  <button class="btn" onclick="openMap()">Buka di Google Maps</button>

</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

function openMap() {
  window.open("https://www.google.com/maps/place/Kutai+Kartanegara", "_blank");
}
</script>

</body>
</html>
