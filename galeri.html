<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Kutai Kartanegara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #DCE5C1;
}

.navbar {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #6F7F5F;
  padding: 12px;
  position: relative;
  z-index: 1000;
}

.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.menu a {
  color: #F5F5DC;
  margin: 5px;
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 8px;
}

.menu a:hover {
  background: #556B4F;
}

.menu a.active {
  background: #DCE5C1;
  color: #2F3E2C;
}

.hamburger {
  position: absolute;
  left: 15px;
  font-size: 26px;
  color: #F5F5DC;
  cursor: pointer;
  display: none;
  z-index: 1100;
}

.section {
  padding: 40px;
  text-align: center;
}

.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
}

.card {
  width: 220px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  display: block;
}

.card p {
  position: absolute;
  bottom: 0;
  width: 100%;
  margin: 0;
  padding: 10px;
  color: white;
  font-weight: 500;
  background: linear-gradient(to top, rgba(111,127,95,0.85), rgba(0,0,0,0));
  text-align: center;
}

@media (min-width: 769px) {
  .menu {
    display: flex !important;
    position: static;
  }
}

@media (max-width: 768px) {

  .hamburger {
    display: block;
  }

  .menu {
    display: none;
    flex-direction: column;
    width: 100%;
    background: #6F7F5F;
    position: absolute;
    top: 100%;
    left: 0;
    z-index: 1000;
  }

  .menu a {
    text-align: center;
    padding: 12px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }

  .menu.show {
    display: flex;
  }

  .card {
    width: 90%;
  }

  .card img {
    height: 200px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <div class="menu" id="menu">
    <a href="index.html">Home</a>
    <a href="wisata.html">Wisata</a>
    <a href="aktivitas.html">Aktivitas</a>
    <a href="budaya.html">Budaya</a>
    <a href="kuliner.html">Kuliner</a>
    <a href="hotel.html">Akomodasi</a>
    <a href="transportasi.html">Transportasi</a>
    <a href="peta.html">Peta</a>
    <a href="tiket.html">Tiket</a>
    <a href="tentang.html">Tentang</a>
    <a href="galeri.html" class="active">Galeri</a>
  </div>
</div>

<div class="section">
  <div class="container">

    <div class="card">
      <img src="https://www.image2url.com/r2/default/images/1776164024322-6feebec1-f0e8-4bce-9ada-8203db7500df.jpg">
      <p>Museum Mulawarman</p>
    </div>

    <div class="card">
      <img src="https://www.image2url.com/r2/default/images/1776164083084-0ee0302d-2f6d-47d6-9972-80fab974f9b9.jpg">
      <p>Jembatan Kutai Kartanegara</p>
    </div>

    <div class="card">
      <img src="https://www.image2url.com/r2/default/images/1776164157371-4f452be8-9bbc-489e-8706-d02dc24b137e.jpg">
      <p>Ladang Budaya</p>
    </div>

    <div class="card">
      <img src="https://www.image2url.com/r2/default/images/1776164233650-0d626e8c-4e27-42ec-90cf-c0f5810577e4.jpg">
      <p>Sungai Mahakam</p>
    </div>

  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
